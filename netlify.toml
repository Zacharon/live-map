[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/events"
  to = "/.netlify/functions/events"
  status = 200
  force = true

[[redirects]]
  from = "/api/layers"
  to = "/.netlify/functions/layers"
  status = 200
  force = true

[[redirects]]
  from = "/api/countries"
  to = "/.netlify/functions/countries"
  status = 200
  force = true

[[redirects]]
  from = "/api/country-risk"
  to = "/.netlify/functions/country-risk"
  status = 200
  force = true

[[redirects]]
  from = "/api/markets"
  to = "/.netlify/functions/markets"
  status = 200
  force = true

[[redirects]]
  from = "/api/infrastructure"
  to = "/.netlify/functions/infrastructure"
  status = 200
  force = true

[[redirects]]
  from = "/api/source-status"
  to = "/.netlify/functions/source-status"
  status = 200
  force = true

[[redirects]]
  from = "/api/provider-health"
  to = "/.netlify/functions/provider-health"
  status = 200
  force = true

[[redirects]]
  from = "/api/sources"
  to = "/.netlify/functions/sources"
  status = 200
  force = true

[[redirects]]
  from = "/sources"
  to = "/source-explorer.html"
  status = 200

[[redirects]]
  from = "/diagnostics"
  to = "/diagnostics.html"
  status = 200

[[redirects]]
  from = "/countries"
  to = "/countries.html"
  status = 200

[[redirects]]
  from = "/api/briefs"
  to = "/.netlify/functions/briefs"
  status = 200
  force = true

[[redirects]]
  from = "/api/alerts/test"
  to = "/.netlify/functions/alerts-test"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://server.arcgisonline.com https://services.arcgisonline.com https://a.tile.openstreetmap.org https://b.tile.openstreetmap.org https://c.tile.openstreetmap.org https://a.basemaps.cartocdn.com https://b.basemaps.cartocdn.com https://c.basemaps.cartocdn.com https://d.basemaps.cartocdn.com; connect-src 'self' https://earthquake.usgs.gov https://eonet.gsfc.nasa.gov https://api.weather.gov https://api.reliefweb.int https://www.gdacs.org https://server.arcgisonline.com https://services.arcgisonline.com https://a.tile.openstreetmap.org https://b.tile.openstreetmap.org https://c.tile.openstreetmap.org https://a.basemaps.cartocdn.com https://b.basemaps.cartocdn.com https://c.basemaps.cartocdn.com https://d.basemaps.cartocdn.com; font-src 'self' data:; frame-src 'self' https://app.netlify.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
